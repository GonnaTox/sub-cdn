name: Sync subscription
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest config
        run: |
          mkdir -p docs
          curl -sf "https://cdn.glitx.xyz/sub/a5uxv3y1t25ltwfo" -o docs/config.json

      - name: Commit if changed
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add docs/config.json
          git diff --staged --quiet || git commit -m "sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
