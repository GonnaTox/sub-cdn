name: Sync subscriptions
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all configs
        run: |
          mkdir -p docs
          FAILED=0
          for row in $(jq -r 'to_entries[] | @base64' users.json); do
            _jq() { echo "${row}" | base64 --decode | jq -r "${1}"; }
            token=$(_jq '.key')
            name=$(_jq '.value')
            echo "Fetching $name ($token)..."
            if curl -sf "https://cdn.glitx.xyz/sub/${token}" -o "docs/${name}.json"; then
              echo "OK: ${name}.json"
            else
              echo "FAILED: ${name} (token=${token})"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Commit if changed
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add docs/*.json
          git diff --staged --quiet || git commit -m "sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
